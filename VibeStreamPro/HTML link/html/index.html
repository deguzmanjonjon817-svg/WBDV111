<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>H O M E</title>

<style>
    body {
        background-color: white;
    }
    .header {
        border: 1px solid black;
        width: 83%;
        height: 100px;
        border-radius: 20px;
        float: right;

        display: flex;
        justify-content: space-between; 
        align-items: center;
    }

    .header h1 {
        margin-left: 40px;

    }
    .nav-items {
        list-style: none;
        display: flex;
        gap: 60px;
        margin: 90px;
        padding: 0;
    }

    .nav-items li a {
        border: 1px solid black;
        padding: 8px 15px;         
        border-radius: 8px; 
        text-decoration: none;
        color: black;
        font-weight: bold;
    }

    .sidebar {
        border: 1px solid black;
        width: 13%;
        height: 680px;
        float: left;
        border-radius: 20px;

        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
    }

    .sidebar input {
        width: 80%;
        padding: 8px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid black;
    }

    .menu-section p,
    .bottom-section p {
        cursor: pointer;
        padding: 8px 0;
        font-weight: bold;
    }

    .menu-section p:hover,
    .bottom-section p:hover {
        color: black;
    }

    .main {
        border: 1px solid black;
        width: 80%;
        height: 567px;
        float: right;
        margin-top: 10px;
        border-radius: 20px;

        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        padding: 20px;
    
    }

    .box {
        border: 1px solid black;
        border-radius: 20px;
        height: 200px;
    }

    .box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 20px;
    }
    
    .box p {
        margin-top: 8px;
        font-weight: bold;
        text-align: center;
    }

    .leftbox {
        border: 1px solid black;
        width: 20%;
        height: 270px;
        margin-top: 12px;
        margin-left: 10px;
        float: left;
        border-radius: 20px;
    }

    .rightbox {
        border: 1px solid black;
        width: 20%;
        height: 270px;
        margin-top: 12px;
        margin-right: 10px;
        float: right;
        border-radius: 20px;
    }

</style>

</head>

<body>

<div class="header">
    <h1>My Playlist</h1>
    <ul class="nav-items">
            <li><a href="#Home">Home</a></li>
            <li><a href="#About">About</a></li>
            <li><a href="#Contact">Contact</a></li>
    </ul>
</div>

<div class="sidebar">
    <div class="top-section">
        <h3>Now Playing</h3>
        <input type="text" placeholder="Search...">
        <hr>
    </div>
    <div class="menu-section">
        <p>Playlist</p>
        <p>Artist</p>
        <p>Album</p>
        <p>Tracks</p>
    </div>
    <div class="bottom-section">
        <p>Settings</p>
    </div>
</div>

<div class="main">
    <div class="box" onclick="playSong('Loose-DanielCaesar.mp3')">
        <img src="loose.jfif" alt="Playlist Cover">
        <p>Loose</p>
    </div>
    <div class="box" onclick="playSong('Blessed-DanielCaesar.mp3')">
        <img src="loose.jfif" alt="Playlist Cover">
        <p>Blessed</p>
    </div>
    <div class="box" onclick="playSong('HoldMeDown-DanielCaesar.mp3')">
        <img src="loose.jfif" alt="Playlist Cover">
        <p>Hold Me Down</p>
    </div>
    <div class="box" onclick="playSong('LetMeGo-DanielCeasar.mp3')">
        <img src="never.jfif" alt="Playlist Cover">
        <p>Let Me Go</p>
    </div>
    <div class="box" onclick="playSong('Valentina-DanielCeasar.mp3')">
        <img src="never.jfif" alt="Playlist Cover">
        <p>Valentina</p>
    </div>
    <div class="box" onclick="playSong('Always-DanielCeasar.mp3')">
        <img src="never.jfif" alt="Playlist Cover">
        <p>Always</p>
    </div>
</div>

    <script>
        let audio = new Audio(); 

        function playSong(file) {
            audio.src = file;   
            audio.play();     
        }
    </script>

</body>
</html>
