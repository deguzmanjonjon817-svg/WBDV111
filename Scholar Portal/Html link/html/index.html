<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #c9a97f;
            font-family: Arial, sans-serif;
        }

        /* HEADER */
        .header {
            background: #2f6fa5;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
        }

        /* NAVIGATION */
        .nav {
            display: flex;
            gap: 15px;
        }
        .nav a {
            text-decoration: none;
            padding: 10px 20px;
            color: white;
            border-radius: 6px;
            font-weight: bold;
        }

        .nav a:hover {
            opacity: 0.85;
        }

        .nav button {
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .courses { background: #4caf50; }
        .register { background: #ff9800; }
        .profile { background: #e91e63; }

        .nav button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* CENTER AREA */
        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* LOGIN BOX */
        .login-box {
            width: 700px;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-left: 12px solid #f4c542;
        }

        .login-box h2 {
            margin-top: 0;
            text-align: center;
            color: #2f6fa5;
        }

        /* INPUTS */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 665px;
            padding: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #2f6fa5;
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* BUTTON */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #2f6fa5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .login-btn:hover {
            background: #255a86;
            transform: translateY(-2px);
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1>Student Portal</h1>

        <div class="nav">
            <a href="catalog.html" class="courses">Courses</a>
            <button class="register">Register</button>
            <button class="profile">Profile</button>
        </div>
    </div>

    <!-- CENTER LOGIN -->
    <div class="main">
        <div class="login-box">
            <h2>Login</h2>

            <form onsubmit="return validateForm()">
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="number" id="studentId" placeholder="Enter your Student ID" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your Password">
                </div>

                <button class="login-btn">Login</button>
            </form>
        </div>
    </div>

    <script>
    function validateForm() {
        let studentId = document.getElementById("studentId");
        let password = document.getElementById("password");

        if (studentId.value === "" || password.value === "") {
            alert("Please fill in both Student ID and Password!");

            studentId.style.border = studentId.value === "" ? "2px solid red" : "";
            password.style.border = password.value === "" ? "2px solid red" : "";

            return false;
        }
        window.location.href = "catalog.html";

        return false; // prevent form reload
    }
    </script>

</body>
</html>
