<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ff7eb3;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 85%;
            height: 75%;
            background: #e6e6e6;
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* LEFT SIDE (IMAGE AREA) */
        .left {
            width: 60%;
            position: relative;
            overflow: hidden;
        }
        /* SLIDER CONTAINER */
        .slider {
            display: flex;
            height: 100%;
            transition: transform 0.5s ease;
        }

        /* IMAGES */
        .slider img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            flex-shrink: 0;
        }
        /* ARROWS */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border: 2px solid black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            cursor: pointer;
            background: transparent;
        }
        .arrow:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .arrow.left-arrow {
            left: 20px;
        }

        .arrow.right-arrow {
            right: 20px;
        }

        /* RIGHT SIDE (LOGIN) */
        .right {
            width: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 70%;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 10px;
        }

        .login-box p {
            font-size: 14px;
            color: #777;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        .forgot {
            font-size: 12px;
            color: #666;
            margin: 10px 0;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(to right, #ff7eb3, #aa286f);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.05);
            background: linear-gradient(to right, #aa286f, #ff7eb3);
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LEFT IMAGE SECTION -->
    <div class="left">
        <div class="slider">
        <img src="mu1.webp" class="main-img">
        <img src="mu2.jpg" class="main-img">
        <img src="mu3.jpg" class="main-img">
        <img src="mu4.JPG" class="main-img">
        </div>
        
        <div class="arrow left-arrow">&#8249;</div>
        <div class="arrow right-arrow">&#8250;</div>
    </div>

    <!-- RIGHT LOGIN SECTION -->
    <div class="right">
        <div class="login-box">
            <h2>Login</h2>
            <p>Good to see you again!</p>

            <input type="text" placeholder="Gmail">
            <input type="password" placeholder="Password">

            <div class="forgot">Forgot your password?</div>

            <button class="btn">SIGN IN</button>
        </div>
    </div>

</div>
<script>
    const slider = document.querySelector(".slider");
    const images = document.querySelectorAll(".slider img");
    const leftBtn = document.querySelector(".left-arrow");
    const rightBtn = document.querySelector(".right-arrow");

    let index = 0;
    const total = images.length;

    function showSlide() {
        slider.style.transform = `translateX(-${index * 100}%)`;
    }

    // RIGHT BUTTON
    rightBtn.addEventListener("click", () => {
        index++;
        if (index >= total) index = 0;
        showSlide();
    });

    // LEFT BUTTON
    leftBtn.addEventListener("click", () => {
        index--;
        if (index < 0) index = total - 1;
        showSlide();
    });

    // AUTO SLIDE
    setInterval(() => {
        index++;
        if (index >= total) index = 0;
        showSlide();
    }, 8000); // change every 3 seconds
</script>
</body>
</html>
