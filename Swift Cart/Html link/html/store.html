<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glow Beauty Store</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f7f7f7;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ff7eb3;
    padding: 15px 30px;
    color: white;
}

.navbar h1 {
    margin: 0;
}

.nav-links span {
    margin-left: 20px;
    cursor: pointer;
    font-weight: bold;
}

/* SECTIONS */
.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.product {
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.product img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.product h3 {
    margin: 10px 0;
}

.product button {
    background: #ff7eb3;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

/* CART */
.cart-item {
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>Glow Beauty</h1>
    <div class="nav-links">
        <span onclick="showSection('catalog')">Catalog</span>
        <span onclick="showSection('cart')">Cart (<span id="cart-count">0</span>)</span>
    </div>
</div>

<!-- CATALOG -->
<div id="catalog" class="section active">
    <h2>Makeup Catalog</h2>
    <div class="products">

        <div class="product">
            <img src="lip1.jpg" alt="Dior Lipstick">
            <h3>Lipstick</h3>
            <p>₱ 3,500</p>
            <button onclick="addToCart('Lipstick', 3500)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="lip2.jpg" alt="Dior Foundation">
            <h3>Foundation</h3>
            <p>₱ 5,300</p>
            <button onclick="addToCart('Foundation', 5300)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="lip3.jfif" alt="Dior Blush">
            <h3>Blush</h3>
            <p>₱ 3,200</p>
            <button onclick="addToCart('Blush', 3200)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="lip4.webp" alt="Dior Mascara">
            <h3>Mascara</h3>
            <p>₱ 3,400</p>
            <button onclick="addToCart('Mascara', 3400)">Add to Cart</button>
        </div>
        <div class="product">
            <img src="lip5.webp" alt="Dior Concealer">
            <h3>Concealer</h3>
            <p>₱ 3,100</p>
            <button onclick="addToCart('Concealer', 3100)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="lip6.jfif" alt="Dior Highlighter">
            <h3>Highlighter</h3>
            <p>₱ 4,000</p>
            <button onclick="addToCart('Highlighter', 4000)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="lip7.jpg" alt="Dior Setting Spray">
            <h3>Setting Spray</h3>
            <p>₱ 3,700</p>
            <button onclick="addToCart('Setting Spray', 3700)">Add to Cart</button>
        </div>
        <div class="product">
            <img src="lip8.jpg" alt="Dior Loose Powder">
            <h3>Loose Powder</h3>
            <p>₱ 4,900</p>
            <button onclick="addToCart('Setting Spray', 4900)">Add to Cart</button>
        </div>
    </div>
</div>

<!-- CART -->
<div id="cart" class="section">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total">Total: ₱0</h3>
</div>

<script>
let cart = [];

function showSection(sectionId) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
}

function addToCart(name, price) {
    cart.push({name, price});
    updateCart();
}

function removeFromCart(index) {
    cart.splice(index, 1);
    updateCart();
}

/* ✅ PUT IT HERE */
function formatPeso(amount) {
    return new Intl.NumberFormat('en-PH', {
        style: 'currency',
        currency: 'PHP'
    }).format(amount);
}

/* THEN your updateCart */
function updateCart() {
    const cartItems = document.getElementById("cart-items");
    const cartCount = document.getElementById("cart-count");
    const totalDisplay = document.getElementById("total");

    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;

        const div = document.createElement("div");
        div.classList.add("cart-item");

        div.innerHTML = `
            ${item.name} - ${formatPeso(item.price)}
            <button onclick="removeFromCart(${index})">Remove</button>
        `;

        cartItems.appendChild(div);
    });

    cartCount.textContent = cart.length;
    totalDisplay.textContent = "Total: " + formatPeso(total);
}
</script>

</body>
</html>
