<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bakery</title>

    <style>
    body {
        margin: 0;
        min-height: 100vh;

        background: linear-gradient(135deg, #7ea6c7, #d7dbe3, #e6c7a5);
        background-size: cover;
        font-family: Arial, sans-serif;

        display: flex;
        flex-direction: column;
        align-items: center;
    }
    
    .nav-items {
        font-family: "Lucida Handwriting";
        display: flex;
        list-style: none;
        gap: 60px;
        margin-right: 60px;
    }

    .nav-items a {
        border: 1px solid black;
        padding: 8px 15px;
        transition: transform 0.3s ease;
        border-radius: 15px;
        text-decoration: none;
        color: black;
        font-weight: bold;
    }

    .nav-items a:hover {
        transform: scale(1.1);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .topbar {
        font-family: "Lucida Handwriting";
        border: 1px solid black;
        width: 80%;
        height: 100px;
        border-radius: 20px;
        float: right;
        margin-top: 20px;

        display: flex;
        justify-content: space-between; 
        align-items: center;

        padding-left: 30px;
    }

    h1 {
        font-family: "Lucida Handwriting";
        font-size: 42px;
        text-align: center;
    }

    .header h1 {
        margin-left: 40px;
    }

    p {
        font-family: "Lucida Handwriting";
        text-align: center;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(3, 300px);
        gap: 80px;
        margin-top: 20px;

        justify-content: center;
    }
    
    .container a {
        text-decoration: none;
        color: black;
    }
    .box {
        width: 300px;
        height: 300px;
        border: 2px solid black;
        border-radius: 15px;
        transition: transform 0.3s ease;
    }

    .box:hover {
        transform: scale(1.1);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .box p {
        text-align: center;
        margin-top: 10px;
        font-weight: bold;
    }

    .box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 20px;
    }

    </style>

</head>

<body>
    <div class="topbar">
        <h2>Jonjon's Bakery</h2>
        <ul class="nav-items">
            <li><a href="#Home">Home</a></li>
            <li><a href="#About">About</a></li>
            <li><a href="#Contact">Contact</a></li>
        </ul>
    </div>
    <div>
        <i><h1>Cake Gallery</h1></i>
        <i><p>Find the perfect treat to satisfy your sweet cravings.</p></i>
    </div>
    <div class="container">
        <a href="orderdetails.html">
        <div class="box">
            <img src="cake1.jpg">
            <p>Chocolate Strawberry Cake</p>
        </div>
        </a>
        <a href="orderdetails.html">
        <div class="box">
            <img src="cake2.jpg">
            <p>Eggless Mango Cake</p>
        </div>
        </a>
        <a href="orderdetails.html">
        <div class="box">
            <img src="cake3.jpeg">
            <p>Red Velvet Cake</p>
        </div>
        </a>
        <a href="orderdetails.html">
        <div class="box">
            <img src="cake4.jpg">
            <p>Tiramisu Cake</p>
        </div>
        </a>
        <a href="orderdetails.html">
        <div class="box">
            <img src="cake5.jpg">
            <p>Oreo Cake</p>
        </div>
        </a>
        <a href="orderdetails.html">
        <div class="box">
            <img src="cake6.jpg">
            <p>Mocha Cake</p>
        </div>
        </a>
    </div>
</body>

</html>
