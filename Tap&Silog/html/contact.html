<!DOCTYPE html>
<html>
<head>
  <title>Contact Us</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
  body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #121212;
    color: white;
  }

  .header{
    width:100%;
    height:100px;
    background:#000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 12%;
    position:sticky;
    top:0;
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.05);
  }

  .logo{
    display:flex;
    align-items:center;
    gap:16px;
  }

  .logo-box{
    width:50px;
    height:50px;
    background:white;
    color:black;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    font-weight:bold;
  }

  .nav{
    display:flex;
    gap:50px;
  }

  .nav a{
    color:#d7d7d7;
    text-decoration:none;
    font-size:20px;
    font-weight:600;
  }

  .nav a:hover{
    color:white;
  }

  .header-right{
    display:flex;
    align-items:center;
    gap:30px;
  }

  .login-btn{
    padding:12px 28px;
    border:1px solid rgba(255,255,255,0.7);
    background:transparent;
    color:white;
    border-radius:14px;
    font-size:18px;
    font-weight:600;
  }

  .contact-section{
    max-width: 1100px;
    margin: 80px auto;
    padding: 20px;
  }

  .contact-title{
    font-size: 42px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .contact-sub{
    color:#aaa;
    margin-bottom: 40px;
  }

  .contact-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
  }

  .contact-box{
    background:#1a1a1a;
    padding:40px; 
    border-radius:16px;
    border:1px solid #2a2a2a;
  }

  .contact-box h3{
    margin-bottom:20px;
  }

  .input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:10px;
    border:none;
    background:#111;
    color:white;
  }

  textarea.input{
    height:140px;
    resize:none;
  }

  .btn{
    width:100%;
    padding:14px;
    background:white;
    color:black;
    font-weight:700;
    border-radius:10px;
  }

  .info p{
    margin:10px 0;
    color:#ccc;
  }

  .icon{
    margin-right:10px;
    color:#fff;
  }
  .contact-section{
    padding:60px 0;
  }

  .contact-title{
    text-align:center;
    font-size:28px;
    margin-bottom:30px;
    font-weight:700;
  }

  .contact-wrapper{
    display:flex;
    gap:40px;
    align-items:flex-start;
  }

  .contact-info{
    flex:1;
    background:#1a1a1a;
    padding:25px;
    border-radius:12px;
  }

  .contact-form{
    flex:1;
    background:#1a1a1a;
    padding:25px;
    border-radius:12px;

    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .contact-form input,
  .contact-form textarea{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #333;
    background:#121212;
    color:white;
    box-sizing:border-box;
  }

  .contact-form label{
    font-size:13px;
    color:#aaa;
    margin-top:6px;
  }

  .contact-form button{
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:white;
    color:black;
    font-weight:700;
    cursor:pointer;
  }

  .contact-form button:hover{
    background:#ddd;
  }

  @media(max-width:768px){
    .contact-wrapper{
      flex-direction:column;
    }
  }
  </style>
</head>

<body>
  <header class="header">
    <div class="logo">
      <div class="logo-box">S</div>
      <h1>TAP&SILOG</h1>
    </div>

    <nav class="nav">
      <a href="home.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

    <div class="header-right">
      <button class="login-btn">Login</button>
    </div>
  </header>

  <section class="contact-section">
    <div class="container">
      <h2 class="contact-title">Contact Us</h2>
      <div class="contact-wrapper">
        <div class="contact-info">
          <h3>Contact Information</h3>
          <p><strong>Email (Gmail):</strong> support@tapsilog.com</p>
          <p><strong>Phone:</strong> +63 916 348 2331</p>
          <p><strong>Store Hours:</strong> 24/7</p>
          <p><strong>Location:</strong> Philippines</p>
        </div>

        <form class="contact-form">
          <label>Name</label>
          <input type="text" placeholder="Your name">
          <label>Email (Gmail)</label>
          <input type="email" placeholder="you@gmail.com">
          <label>Subject</label>
          <input type="text" placeholder="Message subject">
          <label>Message</label>
          <textarea placeholder="Write your message..."></textarea>
          <button type="submit">Send Message</button>
        </form>
      </div>
    </div>
  </section>

</body>
</html>
