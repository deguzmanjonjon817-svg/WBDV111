<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>

        <style>
        .background {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: black;
        }
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .login-box {
            width: 420px;
            padding: 40px;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
            color: black;
        }
        .login-box h1 {
            margin-bottom: 10px;
            font-size: 38px;
        }
        .login-box hr {
            border: none;
            height: 1px;
            background: rgba(255,255,255,0.3);
            margin: 15px 0;
        }
        .input-box {
            position: relative;
            margin: 15px 0;
        }
        .input-box input {
            width: 70%;
            padding: 12px 40px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.4);

            background: rgba(255,255,255,0.1);
            color: black;
            outline: none;
        }
        .input-box input::placeholder {
            color: black;
        }
        .input-box i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #ddd;
        }
        .login-btn {
            width: 90%;
            margin-top: 15px;
            padding: 12px;

            background: linear-gradient(#1e90ff,#0c6ed5);
            border: none;
            border-radius: 6px;

            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .login-btn:hover {
            background: linear-gradient(#0c6ed5,#0958a8);
        }
        </style>
    </head>
<body>
    <img src="bg.webp" class="bg-image">
    <div class="login-container">
        <div class="login-box">
            <h1>Login</h1>
            <hr>
            <div class="input-box">
                <i class="fa fa-user"></i>
                <input type="text" placeholder="Email or Username">
            </div>
            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" placeholder="Password">
            </div>
            <div class="input-box">
                <i class="fa fa-phone"></i>
                <input type="text" placeholder="Phone Number" id="phone">
            </div>
            <div class="input-box">
                <label for="checkin">Check-in Date</label>
                <input type="date" id="checkin">
            </div>
            <div class="input-box">
                <label for="checkout">Check-out Date</label>
                <input type="date" id="checkout">
            </div>
            <div class="input-box">
                <label for="arrival">Arrival Time</label>
                <input type="time" id="arrival">
            </div>
            <div class="input-box">
                <i class="fa fa-user"></i>
                <input type="number" placeholder="Number of Guests" id="guests" min="1">
            </div>
            <div class="input-box">
                <i class="fa fa-bed"></i>
                <input type="number" placeholder="Number of Rooms" id="rooms" min="1">
            </div>
            <button class="login-btn" onclick="window.location.href='room.html'">Submit</button>
        </div>
    </div>
</body>
</html>
