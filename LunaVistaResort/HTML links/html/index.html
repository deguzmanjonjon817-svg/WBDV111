<!DOCTYPE html>
<html>
    <head>
        <title>Luna Vista Resort</title>
        <style>
        .background {
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }
        body {
            background: transparent;
            color: white;
        }
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
        header {
            width: 95%;
            margin-top: 10px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;

            border: 3px solid black;
            border-radius: 10px;
            padding: 15px 30px;
            background: transparent;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 3px solid black;
        }
        .logo {
            font-size: 50px;
            font-weight: bold;
            }
            nav a{
                border: 2px solid black;
                border-radius: 10px;
                padding: 10px 15px;
                text-decoration: none;
                color: white;
                margin-left: 20px;
                font-weight: 600;
                background-color: black;
                transition: transform 0.3s, box-shadow 0.3s;
        }
        nav a:hover {
            transform: translateY(-10px);
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3); 
        }
        .cards{
            width: 80%;
            margin: 40px auto;

            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 40px;
        }
        .card {
            background: transparent;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 3px solid black;
            border-radius: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0px 15px 30px rgba(0,0,0,0.4);
        }
        .img-box {
            border-radius: 7px;
            height: 200px;
            background: #ddd;
        }
        .img-box img {
            width:100%;
            height:100%;
            object-fit:cover;
            border-radius:7px;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 10px;
            border-top: 2px solid black;
        }
        button {
            font-size: medium;
            padding: 5px 15px;
            cursor: pointer;
            color: white;

            background-color: black;
            border: 3px solid black;
            border-radius: 10px;.
            transition: transform 0.3s, box-shadow 0.3s;
        }
        button:hover {
            transform: translateY(-10px);
            box-shadow: 0px 15px 30px rgba(0,0,0,0.4);
        }
        </style>
    </head>
<body>
    <img src="bg2.webp" class="bg-image">
    <header>
        <div>LUNA VISTA RESORT</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Reservation</a>
        </nav>
    </header>
    <section class="cards">
        <div class="card">
            <div class="img-box">
                <img src="room1.jpg">
            </div>
            <div class="card-footer">
                <h3>Deluxe Room</h3>
                <button onclick="window.location.href='deluxe.html'">Rooms</button>
            </div>
        </div>
        <div class="card">
            <div class="img-box">
                <img src="room3.jpg">
            </div>
            <div class="card-footer">
                <h3>Suite Room</h3>
                <button>Rooms</button>
            </div>
        </div>
        <div class="card">
            <div class="img-box">
                <img src="room4.jpg">
            </div>
            <div class="card-footer">
                <h3>Junior Suite</h3>
                <button>Rooms</button>
            </div>
        </div>
        <div class="card">
            <div class="img-box">
                <img src="room5.jpg">
            </div>
            <div class="card-footer">
                <h3>Executive Room</h3>
                <button>Rooms</button>
            </div>
        </div>
       <div class="card">
            <div class="img-box">
                <img src="room2.jpg">
            </div>
            <div class="card-footer">
                <h3>Presidential Suite</h3>
                <button>Rooms</button>
            </div>
        </div>
        <div class="card">
            <div class="img-box">
                <img src="room6.jpg">
            </div>
            <div class="card-footer">
                <h3>Superior Room</h3>
                <button>Rooms</button>
            </div>
        </div>
    </section>
    <script>
    function selectRoom(roomName) {
        alert(`You selected: ${roomName}`);
    }
    </script>
</body>
</html>
