<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
    <style>
        body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  color: #000; /* DARK TEXT */
}
/* Header */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  color: #1f4e8c;
}

.nav-buttons button {
  margin-left: 10px;
  padding: 8px 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

.nav-buttons .primary {
  background: #1f4e8c;
  color: white;
  border: none;
}
/* Container */
.container {
  max-width: 1100px;
  margin: 60px auto;
  display: flex;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  border-bottom: 6px solid #1f4e8c; /* BLUE THEME */
}

/* Left */
.left {
  flex: 1;
  padding: 50px;
}

.left h1 {
  font-size: 40px;
  color: #1f4e8c;
}

.left .light {
  color: #999;
  font-weight: normal;
}

.left p {
  margin-top: 20px;
  color: #333;
}

/* Right */
.right {
  flex: 1;
  padding: 50px;
}

.right h2 {
  color: #1f4e8c;
}

.subtitle {
  font-size: 14px;
  color: #333;
  margin-bottom: 30px;
}

/* Inputs */
form input[type="text"],
form input[type="password"] {
  width: 100%;
  padding: 10px;
  margin: 15px 0;
  border: none;
  border-bottom: 1px solid #ccc;
  outline: none;
  color: #000;
}

/* Options (FIXED CHECKBOX ALIGNMENT) */
.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 15px 0 25px;
  font-size: 14px;
}

.remember {
  display: flex;
  align-items: center;
  gap: 8px;
}

.remember input {
  width: 16px;
  height: 16px;
  cursor: pointer;
}

/* Buttons */
.buttons {
  display: flex;
  gap: 10px;
}

.login {
  flex: 1;
  background: #1f4e8c;
  color: white;
  border: none;
  padding: 12px;
  border-radius: 6px;
  cursor: pointer;
}

.signup {
  flex: 1;
  background: white;
  border: 1px solid #1f4e8c;
  color: #1f4e8c;
  padding: 12px;
  border-radius: 6px;
  cursor: pointer;
}

/* Hover */
.login:hover {
  background: #163a66;
}

.signup:hover {
  background: #eef3fb;
}
    </style>
</head>
<body>
    <header>
    <div class="logo">Harborview Medical Group</div>
    <div class="nav-buttons">
        <button class="primary">Login</button>
        <button>Staff</button>
        <button>History</button>
    </div>
    </header>
<div class="container">

  <!-- LEFT SIDE -->
  <div class="left">
    <h1><span class="light">Trends</span><br>Healthcare</h1>
    <p>All your healthcare need on your finger tips.</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h2>Healthcare</h2>
    <p class="subtitle">Welcome back! Please login to your account.</p>

    <form id="loginForm">
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>

      <div class="options">
        <label class="remember">
          <input type="checkbox">
          <span>Remember me</span>
        </label>
        <a href="#">Forgot Password</a>
      </div>

      <div class="buttons">
        <button type="submit" class="login">Login</button>
        <button type="button" class="signup">Sign up</button>
      </div>
    </form>

  </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();
  window.location.href = "home.html";
});
</script>

</body>
</html>
